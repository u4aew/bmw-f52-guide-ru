<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer dark ring -->
  <circle cx="32" cy="32" r="32" fill="#0f1724"/>
  <!-- White separator ring -->
  <circle cx="32" cy="32" r="29" fill="white"/>
  <!-- Blue quadrants: top-right + bottom-left (BMW roundel pattern) -->
  <path d="M32,32 L32,3 A29,29 0 0,1 61,32 Z" fill="#1C69D4"/>
  <path d="M32,32 L32,61 A29,29 0 0,1 3,32 Z" fill="#1C69D4"/>
  <!-- White quadrants: top-left + bottom-right (explicit for clarity) -->
  <path d="M32,32 L3,32 A29,29 0 0,1 32,3 Z" fill="white"/>
  <path d="M32,32 L61,32 A29,29 0 0,1 32,61 Z" fill="white"/>
  <!-- White cross dividers -->
  <rect x="30.5" y="3" width="3" height="58" fill="white"/>
  <rect x="3" y="30.5" width="58" height="3" fill="white"/>
</svg>
